<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#010409" />
    <meta name="description" content="Street Golf - Urban 9-hole golf tracker PWA. Track your street golf scores in real-time with interactive maps and statistics." />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Street Golf - Urban 9-Hole Tracker" />
    <meta property="og:description" content="Street Golf - Urban 9-hole golf tracker PWA. Track your street golf scores in real-time with interactive maps and statistics." />
    <meta property="og:image" content="/public/images/street-golf.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Street Golf - Urban 9-Hole Tracker" />
    <meta name="twitter:description" content="Street Golf - Urban 9-hole golf tracker PWA. Track your street golf scores in real-time with interactive maps and statistics." />
    <meta name="twitter:image" content="/public/images/street-golf.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Street Golf" />
    <link rel="icon" type="image/png" href="/street-golf/images/street-golf.png" />
    <link rel="manifest" href="/street-golf/manifest.json">
    <title>Street Golf - Urban 9-Hole Tracker</title>
    <script>
      // Handle Firebase OAuth redirect at root domain
      // Firebase redirects to root (https://mjmacfadden.github.io) but app is at /street-golf/
      // This script detects the redirect and forwards it to /street-golf/ with query params preserved
      
      // Debug the redirect script behavior
      const redirectDebug = {
        pathname: window.location.pathname,
        search: window.location.search,
        hash: window.location.hash,
        href: window.location.href,
        hostname: window.location.hostname,
        timestamp: new Date().toLocaleTimeString()
      };
      localStorage.setItem('redirectScriptDebug', JSON.stringify(redirectDebug));
      
      // Case 1: At root with OAuth query params - redirect to /street-golf/ with params
      if (window.location.pathname === '/' && window.location.search) {
        localStorage.setItem('redirectScriptAction', 'redirecting_root_with_query');
        window.location.href = '/street-golf/' + window.location.search;
      } 
      // Case 2: At root without query params - redirect to /street-golf/
      else if (window.location.pathname === '/' && !window.location.search) {
        if (window.location.hostname !== 'localhost') {
          localStorage.setItem('redirectScriptAction', 'redirecting_root_to_subdir');
          window.location.href = '/street-golf/';
        }
      } 
      // Case 3: Already at /street-golf/ with OAuth params - good, no redirect needed
      else if (window.location.pathname === '/street-golf/' && window.location.search) {
        localStorage.setItem('redirectScriptAction', 'already_at_subdir_with_oauth_params');
      }
      // Case 4: Already at /street-golf/ without params - check if we need to go to root for OAuth
      else if (window.location.pathname === '/street-golf/' && !window.location.search) {
        localStorage.setItem('redirectScriptAction', 'at_subdir_no_params');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
