<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#010409" />
    <meta name="description" content="Street Golf - Urban 9-hole golf tracker PWA. Track your street golf scores in real-time with interactive maps and statistics." />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Street Golf - Urban 9-Hole Tracker" />
    <meta property="og:description" content="Street Golf - Urban 9-hole golf tracker PWA. Track your street golf scores in real-time with interactive maps and statistics." />
    <meta property="og:image" content="/public/images/street-golf.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Street Golf - Urban 9-Hole Tracker" />
    <meta name="twitter:description" content="Street Golf - Urban 9-hole golf tracker PWA. Track your street golf scores in real-time with interactive maps and statistics." />
    <meta name="twitter:image" content="/public/images/street-golf.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Street Golf" />
    <link rel="icon" type="image/png" href="/street-golf/images/street-golf.png" />
    <link rel="manifest" href="/street-golf/manifest.json">
    <title>Street Golf - Urban 9-Hole Tracker</title>
    <script>
      // Handle Firebase OAuth redirect at root domain
      // Firebase redirects to root (https://mjmacfadden.github.io) but app is at /street-golf/
      // This script detects the redirect and forwards it to /street-golf/ with query params preserved
      if (window.location.pathname === '/' && window.location.search) {
        // Firebase redirect detected at root - forward to /street-golf/ with query string
        window.location.href = '/street-golf/' + window.location.search;
      } else if (window.location.pathname === '/' && !window.location.search) {
        // Regular root access - redirect to /street-golf/
        if (window.location.hostname !== 'localhost') {
          window.location.href = '/street-golf/';
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
